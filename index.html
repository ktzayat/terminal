<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>_</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #000;
  font-family: 'Share Tech Mono', monospace;
  height: 100vh; width: 100vw;
  overflow: hidden;
  position: relative;
}

#matrix { position:fixed; inset:0; z-index:0; opacity:0.18; }

#crt {
  position:fixed; inset:0; z-index:50; pointer-events:none;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
}
#vignette {
  position:fixed; inset:0; z-index:51; pointer-events:none;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.9) 100%);
}
#gf { position:fixed; inset:0; z-index:200; pointer-events:none; opacity:0; }

#term {
  position:fixed; inset:0; z-index:10;
  display:flex; flex-direction:column; justify-content:flex-end;
  padding: 10vh 8vw 8vh;
}

.ln {
  font-size: clamp(13px,1.8vw,17px);
  line-height: 1.95;
  white-space: pre-wrap;
  word-break: break-word;
  opacity: 0;
  transform: translateY(4px);
  transition: opacity 0.08s, transform 0.08s;
}
.ln.v { opacity:1; transform:none; }

.n  { color:#001800; font-size:10px; letter-spacing:4px; }
.s  { color:#0d3d0d; font-size:11px; }
.w  { color:#2a7a2a; }
.m  { color:#48c848; }
.h  { color:#a8ffa8; font-size:clamp(15px,2vw,19px); }
.g  {
  color:#70c870;
  text-shadow: 2px 0 0 rgba(255,0,80,0.5), -2px 0 0 rgba(0,200,255,0.5);
  animation: glitchTxt 0.15s steps(1) infinite;
}
@keyframes glitchTxt {
  0%,100%{ text-shadow:2px 0 0 rgba(255,0,80,0.5),-2px 0 0 rgba(0,200,255,0.5); }
  50%{ text-shadow:-3px 0 0 rgba(255,0,80,0.6),3px 0 0 rgba(0,200,255,0.6); letter-spacing:1px; }
}

#cur {
  display:inline-block; width:11px; height:17px;
  background:#a8ffa8; animation:cb 0.7s infinite; vertical-align:middle;
}
@keyframes cb { 50%{opacity:0} }

#inputWrap {
  display:flex; align-items:center; gap:8px;
}
#inputWrap input {
  background:transparent; border:none; outline:none;
  color:#a8ffa8; font-family:'Share Tech Mono',monospace;
  font-size:clamp(13px,1.8vw,17px); width:100%;
  caret-color:#a8ffa8;
}
</style>
</head>
<body>
<canvas id="matrix"></canvas>
<div id="crt"></div>
<div id="vignette"></div>
<div id="gf"></div>
<div id="term"></div>

<script>
// ── MATRIX RAIN ───────────────────────────────────────────────────────
const cv = document.getElementById('matrix');
const cx = cv.getContext('2d');
cv.width = window.innerWidth;
cv.height = window.innerHeight;
const cols = Math.floor(cv.width / 16);
const drops = Array(cols).fill(0).map(() => Math.random() * -50);
const chars = 'ｦｧｨｩｪｫｬｭｮｯｰｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ0123456789ABCDEF';
function drawMatrix() {
  cx.fillStyle = 'rgba(0,0,0,0.05)';
  cx.fillRect(0,0,cv.width,cv.height);
  drops.forEach((y,i) => {
    const ch = chars[Math.floor(Math.random()*chars.length)];
    const bright = Math.random() > 0.97;
    cx.fillStyle = bright ? '#a8ffa8' : '#0a3a0a';
    cx.font = (bright?'bold ':'')+'14px Share Tech Mono';
    cx.fillText(ch, i*16, y*16);
    if (y*16 > cv.height && Math.random() > 0.975) drops[i] = 0;
    else drops[i] += 0.4 + Math.random()*0.3;
  });
}
setInterval(drawMatrix, 40);

// ── AUDIO ─────────────────────────────────────────────────────────────
const AC = new (window.AudioContext || window.webkitAudioContext)();
let droneNode = null;

function startDrone() {
  const osc1 = AC.createOscillator();
  const osc2 = AC.createOscillator();
  const gain = AC.createGain();
  const filter = AC.createBiquadFilter();
  filter.type = 'lowpass'; filter.frequency.value = 180;
  osc1.frequency.value = 55; osc1.type = 'sawtooth';
  osc2.frequency.value = 58; osc2.type = 'sawtooth';
  gain.gain.value = 0;
  osc1.connect(filter); osc2.connect(filter);
  filter.connect(gain); gain.connect(AC.destination);
  osc1.start(); osc2.start();
  gain.gain.linearRampToValueAtTime(0.06, AC.currentTime + 3);
  droneNode = gain;
}

function dronePulse() {
  if (!droneNode) return;
  droneNode.gain.linearRampToValueAtTime(0.18, AC.currentTime + 0.3);
  droneNode.gain.linearRampToValueAtTime(0.06, AC.currentTime + 1.2);
}

function chirp(pitch) {
  pitch = pitch || (0.8 + Math.random()*0.4);
  const osc = AC.createOscillator();
  const gain = AC.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(440*pitch, AC.currentTime);
  osc.frequency.exponentialRampToValueAtTime(1800*pitch, AC.currentTime+0.04);
  osc.frequency.exponentialRampToValueAtTime(200*pitch, AC.currentTime+0.09);
  gain.gain.setValueAtTime(0.08, AC.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+0.1);
  osc.connect(gain); gain.connect(AC.destination);
  osc.start(); osc.stop(AC.currentTime+0.11);
}

function interference() {
  const buf = AC.createBuffer(1, AC.sampleRate*0.4, AC.sampleRate);
  const d = buf.getChannelData(0);
  for (let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length);
  const src = AC.createBufferSource(); src.buffer = buf;
  const filter = AC.createBiquadFilter();
  filter.type = 'bandpass'; filter.frequency.value = 600+Math.random()*400; filter.Q.value = 2;
  const gain = AC.createGain(); gain.gain.value = 0.15;
  src.connect(filter); filter.connect(gain); gain.connect(AC.destination);
  src.start();
  const osc = AC.createOscillator(); osc.type='sawtooth';
  const g2 = AC.createGain();
  osc.frequency.setValueAtTime(800, AC.currentTime);
  osc.frequency.exponentialRampToValueAtTime(60, AC.currentTime+0.35);
  g2.gain.setValueAtTime(0.07, AC.currentTime);
  g2.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+0.4);
  osc.connect(g2); g2.connect(AC.destination);
  osc.start(); osc.stop(AC.currentTime+0.4);
}

function hardGlitch() {
  for (let i=0;i<5;i++) {
    setTimeout(() => {
      const buf = AC.createBuffer(1, AC.sampleRate*0.06, AC.sampleRate);
      const d = buf.getChannelData(0);
      for (let j=0;j<d.length;j++) d[j]=Math.random()*2-1;
      const src = AC.createBufferSource(); src.buffer=buf;
      const gain = AC.createGain(); gain.gain.value=0.2-i*0.03;
      src.connect(gain); gain.connect(AC.destination);
      src.start();
    }, i*70);
  }
  dronePulse();
  const gf = document.getElementById('gf');
  gf.style.background='#003300'; gf.style.opacity='0.4';
  setTimeout(()=>gf.style.opacity='0', 80);
  setTimeout(()=>{ gf.style.background='#ff0000'; gf.style.opacity='0.08'; }, 100);
  setTimeout(()=>gf.style.opacity='0', 160);
}

function signalLost() {
  const gf = document.getElementById('gf');
  for (let i=0;i<3;i++) setTimeout(()=>hardGlitch(), i*120);
  setTimeout(() => {
    const buf = AC.createBuffer(1, AC.sampleRate*1.2, AC.sampleRate);
    const d = buf.getChannelData(0);
    for (let i=0;i<d.length;i++) { const e=1-i/d.length; d[i]=(Math.random()*2-1)*e*e; }
    const src = AC.createBufferSource(); src.buffer=buf;
    const filter = AC.createBiquadFilter();
    filter.type='bandpass'; filter.frequency.value=1200; filter.Q.value=0.5;
    const gain = AC.createGain(); gain.gain.value=0.35;
    src.connect(filter); filter.connect(gain); gain.connect(AC.destination);
    src.start();
    const osc=AC.createOscillator(); const g2=AC.createGain();
    osc.type='sawtooth';
    osc.frequency.setValueAtTime(2400,AC.currentTime);
    osc.frequency.exponentialRampToValueAtTime(30,AC.currentTime+1.4);
    g2.gain.setValueAtTime(0.18,AC.currentTime);
    g2.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+1.5);
    osc.connect(g2); g2.connect(AC.destination);
    osc.start(); osc.stop(AC.currentTime+1.5);
    gf.style.background='#00ff41'; gf.style.opacity='0.6';
    setTimeout(()=>gf.style.opacity='0.1', 100);
    setTimeout(()=>{ gf.style.background='#000'; gf.style.opacity='0.95'; }, 400);
    setTimeout(()=>gf.style.opacity='0', 1600);
  }, 360);
  setTimeout(() => {
    const osc=AC.createOscillator(); const gain=AC.createGain();
    osc.type='sine';
    osc.frequency.setValueAtTime(80,AC.currentTime);
    osc.frequency.exponentialRampToValueAtTime(20,AC.currentTime+0.6);
    gain.gain.setValueAtTime(0.4,AC.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.7);
    osc.connect(gain); gain.connect(AC.destination);
    osc.start(); osc.stop(AC.currentTime+0.8);
  }, 500);
  if (droneNode) setTimeout(()=>droneNode.gain.linearRampToValueAtTime(0.001,AC.currentTime+1.5), 600);
}

// ── TERMINAL ──────────────────────────────────────────────────────────
const term = document.getElementById('term');
let allLines = [];

function addLine(text, cls, snd) {
  const el = document.createElement('div');
  el.className = 'ln ' + (cls||'w');
  if (!text) { el.style.height='10px'; el.style.opacity='1'; term.appendChild(el); return el; }
  el.textContent = text;
  term.appendChild(el);
  allLines.push(el);
  while (allLines.length > 18) {
    allLines[0].style.transition='opacity 0.3s';
    allLines[0].style.opacity='0';
    const old = allLines.shift();
    setTimeout(()=>old.remove(), 300);
  }
  requestAnimationFrame(()=>el.classList.add('v'));
  if (snd==='chirp')  chirp();
  else if (snd==='chirp2') chirp(1.4+Math.random()*0.3);
  else if (snd==='int')    interference();
  else if (snd==='glitch') hardGlitch();
  else if (snd==='lost')   signalLost();
  return el;
}

function addCursor() {
  const el = document.createElement('div');
  el.className = 'ln v w';
  el.innerHTML = '<span id="cur"></span>';
  term.appendChild(el);
}

// ── INPUT ──────────────────────────────────────────────────────────────
let inputActive = false;
let inputEl = null;
let responseDone = false;

function activateInput() {
  inputActive = true;
  const wrap = document.createElement('div');
  wrap.id = 'inputWrap';
  wrap.className = 'ln v w';

  const prompt = document.createElement('span');
  prompt.textContent = '> ';
  prompt.style.color = '#2a7a2a';

  inputEl = document.createElement('input');
  inputEl.type = 'text';
  inputEl.placeholder = '_';
  inputEl.autofocus = true;

  wrap.appendChild(prompt);
  wrap.appendChild(inputEl);
  term.appendChild(wrap);
  setTimeout(()=>inputEl.focus(), 100);

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && inputEl.value.trim().length > 0) {
      const typed = inputEl.value.trim();
      wrap.remove();
      inputActive = false;
      addLine('> ' + typed, 'w', null);
      setTimeout(()=>triggerResponse(), 800);
    }
  });
}

}

// ── START ──────────────────────────────────────────────────────────────
let started = false;

function run() {
  startDrone();
  script.forEach(([delay, text, cls, snd]) => {
    setTimeout(() => {
      if (text === '__INPUT__') { activateInput(); return; }
      addLine(text, cls, snd);
    }, delay);
  });
}

document.addEventListener('click', () => {
  if (!started) { started = true; AC.resume().then(run); }
  else if (inputActive && inputEl) inputEl.focus();
});

setTimeout(() => {
  if (!started) { started = true; AC.resume().then(run); }
